<!doctype html>
<html lang="en" dir="ltr" prefix="og: https://ogp.me/ns#">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     Resource Hints - DNS Prefetch & Preconnect
		     Critical-path origins use preconnect (TLS+TCP warm up).
		     Non-critical origins use dns-prefetch to save bytes.
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<!-- Critical: fonts must render the LCP text -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Critical: API + R2 CDN are hit on first paint for posts/images -->
		<link rel="preconnect" href="https://revolution-trading-pros-api.fly.dev" crossorigin />
		<link rel="preconnect" href="https://pub-2e5bd1b702b440bd888a0fc47f3493ae.r2.dev" crossorigin />

		<!-- Non-critical: DNS resolution only (used later for video + analytics) -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />
		<link rel="dns-prefetch" href="https://www.google-analytics.com" />
		<link rel="dns-prefetch" href="https://iframe.mediadelivery.net" />
		<link rel="dns-prefetch" href="https://video.bunnycdn.com" />
		<link rel="dns-prefetch" href="https://vz-5a23b520-193.b-cdn.net" />
		<link rel="dns-prefetch" href="https://revolution-trading-pros-api.fly.dev" />
		<link rel="dns-prefetch" href="https://pub-2e5bd1b702b440bd888a0fc47f3493ae.r2.dev" />

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     PWA & Mobile Configuration
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="/manifest.json" />

		<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="color-scheme" content="dark light" />

		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="RevTradingPros" />
		<meta name="mobile-web-app-capable" content="yes" />

		<meta name="msapplication-TileColor" content="#1a1a1a" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     SEO Base Meta Tags
		     NOTE: robots, OG, Twitter, canonical, verification tags are now
		     managed by the unified SEO layer (<Seo /> in +layout.svelte).
		     Only static, non-route-specific meta tags remain here.
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<meta name="format-detection" content="telephone=no" />
		<meta name="google" content="notranslate" />

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     GEO Optimization for AI Search
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<meta name="subject" content="Professional Trading Education and Tools" />
		<meta name="topic" content="Stock Trading, Day Trading, Swing Trading, Options Trading" />
		<meta
			name="summary"
			content="Revolution Trading Pros offers institutional-grade trading education, live trading rooms, and professional trading tools."
		/>
		<meta name="classification" content="Finance, Education, Trading" />
		<meta name="category" content="Financial Services" />
		<meta name="coverage" content="Worldwide" />
		<meta name="distribution" content="Global" />
		<meta name="rating" content="General" />

		<!-- Pinterest opt-out (static, not route-specific) -->
		<meta name="pinterest" content="nopin" />

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     Fonts
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700;800&family=Open+Sans+Condensed:wght@700&family=Montserrat:wght@500;600;700;800&display=swap"
			fetchpriority="high"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700;800&family=Open+Sans+Condensed:wght@700&family=Montserrat:wght@500;600;700;800&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700;800&family=Open+Sans+Condensed:wght@700&family=Montserrat:wght@500;600;700;800&display=swap"
				rel="stylesheet"
			/>
		</noscript>

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     Critical CSS
		     Inlined to avoid render-blocking requests on first paint.
		     Reserves the hero viewport so the <Hero> hydrating later cannot
		     cause CLS. Matches body bg (#0a0a0a) to mask font swaps (no FOUT flash).
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<style>
			/* Base HTML */
			html {
				font-family:
					'Inter',
					'Open Sans',
					system-ui,
					-apple-system,
					sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				text-rendering: optimizeLegibility;
				scroll-behavior: smooth;
				overflow-x: hidden;
				scrollbar-gutter: stable;
			}

			body {
				margin: 0;
				padding: 0;
				background-color: #0a0a0a;
				color: #f5f5f5;
				min-height: 100vh;
				min-height: 100dvh;
			}

			/* Reserve hero-viewport height on first render so the Hero section
			   hydrating later cannot push content down (CLS = 0). */
			main > :first-child {
				contain: layout paint;
			}

			/* Accessibility - Skip Link */
			.skip-link {
				position: absolute;
				left: -9999px;
				z-index: 9999;
				padding: 0.5rem 1rem;
				background: #2563eb;
				color: white;
				text-decoration: none;
				border-radius: 0.25rem;
				font-weight: 600;
			}

			.skip-link:focus {
				left: 1rem;
				top: 1rem;
			}

			/* Loading Skeleton */
			.loading-skeleton {
				background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
				background-size: 200% 100%;
				animation: skeleton-loading 1.5s infinite;
				/* Avoid compositing on every frame for users who opt out */
			}

			@media (prefers-reduced-motion: reduce) {
				.loading-skeleton {
					animation: none;
				}
				html {
					scroll-behavior: auto;
				}
			}

			@keyframes skeleton-loading {
				0% {
					background-position: 200% 0;
				}
				100% {
					background-position: -200% 0;
				}
			}
		</style>

		<!-- SvelteKit Head Injection -->
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<!-- Accessibility - Skip to Main Content -->
		<a href="#main-content" class="skip-link">Skip to main content</a>

		<!-- App Container -->
		<div id="app" style="display: contents">%sveltekit.body%</div>

		<!-- Service Worker: Registered automatically by SvelteKit (see svelte.config.js) -->

		<!-- ═══════════════════════════════════════════════════════════════════════════
		     Noscript Fallback
		     ═══════════════════════════════════════════════════════════════════════════ -->
		<noscript>
			<style>
				.js-only {
					display: none !important;
				}
				.no-js {
					display: block !important;
				}
			</style>
			<div style="padding: 20px; text-align: center; background: #1a1a1a; color: #f5f5f5">
				<h1>JavaScript Required</h1>
				<p>
					Revolution Trading Pros requires JavaScript for the best experience. Please enable
					JavaScript in your browser settings.
				</p>
			</div>
		</noscript>
	</body>
</html>
