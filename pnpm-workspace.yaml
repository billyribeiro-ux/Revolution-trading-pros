packages:
  - frontend
  - svelte-click-to-source

# pnpm 11 escalates ERR_PNPM_IGNORED_BUILDS to a FATAL non-zero exit by
# default, so a clean `pnpm install --frozen-lockfile` (CI, fresh clone)
# exits 1 even though esbuild/sharp/workerd ship prebuilt platform
# binaries whose postinstall is effectively a no-op. The explicit
# allowlist above is kept for intent/audit; this stops the fatal
# escalation so the install (and every frontend CI job) succeeds.
strictDepBuilds: false

# Before every `pnpm run <script>` pnpm re-verifies installed deps and,
# on any mismatch, tries to REMOVE and reinstall node_modules. In CI
# (no TTY) that abort-prompts and the whole step dies with
# ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY — this is the actual reason
# the Frontend job (check/lint/vitest/build) failed even after install
# succeeded. The lockfile is frozen in CI, so a pre-run reinstall is
# never desired. Reproduced cold and verified: with this set,
# install -> check -> lint -> vitest all pass on a clean checkout.
verifyDepsBeforeRun: false
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - "@sveltejs/kit@2.63.0"
  - concurrently@10.0.3
  - miniflare@4.20260603.0
  - wrangler@4.98.0

peerDependencyRules:
  allowedVersions:
    vite-plugin-devtools-json>vite: ^8.0.0
