# docker-compose.test.yml — overlay for `cargo test` against a real Postgres.
#
# Provisions a separate `test_db` database and a `test` role so that the
# Rust integration tests at api/tests/ can connect without touching the dev DB.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up postgres -d
#
# Note: the base service is named `db` in docker-compose.yml.  This overlay
# targets that same service name so the extra init script is injected at
# container first-start (docker-entrypoint-initdb.d runs only on a fresh
# data volume; wipe with `docker compose down -v` to re-run).
#
# Why not modify docker-compose.yml?  Keeping test infra in a separate overlay
# means the normal `docker compose up -d` boot is unaffected.

services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revolution_trading_pros}
    volumes:
      - ./api/tests/scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
