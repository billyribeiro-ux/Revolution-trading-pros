# Revolution Trading Pros — local dev stack (backend only).
# Frontend is run natively via `pnpm --filter revolution-svelte dev`.
#
# Bring up:    docker compose up -d db redis meili api
# Tear down:   docker compose down            # keeps volumes
#              docker compose down -v         # wipes volumes
# Seed admin:  ./api/scripts/seed-local-admin.sh
#
# Why no `version:` field — Compose v2 ignores it and warns.

services:
  # ──────────────────────────────────────────────────────────────────────
  # PostgreSQL 17
  # ──────────────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: rtp-db
    environment:
      POSTGRES_USER: rtp
      POSTGRES_PASSWORD: rtp_password
      POSTGRES_DB: revolution_trading_pros
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtp -d revolution_trading_pros"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [rtp-network]

  # ──────────────────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: rtp-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [rtp-network]

  # ──────────────────────────────────────────────────────────────────────
  # Meilisearch v1 (full-text search, binds 7700 on host)
  # Master key is dev-only; set MEILI_MASTER_KEY in api/.env for prod.
  # ──────────────────────────────────────────────────────────────────────
  meili:
    image: getmeili/meilisearch:v1.14
    container_name: rtp-meili
    environment:
      MEILI_MASTER_KEY: dev-meili-master-key
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [rtp-network]

  # ──────────────────────────────────────────────────────────────────────
  # Rust + Axum API (binds 8080 on host)
  # ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rtp-api
    ports:
      - "8080:8080"
    # FIX-2026-04-27: load real R2/Stripe/Meili creds (and anything else) from
    # api/.env. The values in the explicit `environment:` block below win on
    # conflict, so docker-compose-managed defaults stay authoritative for DB,
    # Redis, JWT, etc., but secrets in api/.env reach the container.
    # FIX-2026-04-28: also load api/.env.local so Stripe test keys (sk_test_,
    # pk_test_, whsec_) reach the container without being committed to git.
    # api/.env.local overrides api/.env on conflict (list order: last wins).
    # Both files are gitignored (api/.gitignore lines 7-8).
    env_file:
      - ./api/.env
      - path: ./api/.env.local
        required: false
    environment:
      DATABASE_URL: postgres://rtp:rtp_password@db:5432/revolution_trading_pros
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meili:7700
      MEILISEARCH_API_KEY: dev-meili-master-key
      JWT_SECRET: ${JWT_SECRET:-development-secret-key-min-32-chars-long-enough-for-hs256}
      JWT_EXPIRES_IN: "1"
      RUST_LOG: info,sqlx=warn,tower_http=debug
      HOST: 0.0.0.0
      PORT: "8080"
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meili:
        condition: service_healthy
    healthcheck:
      # API exposes /health (no /api prefix). /health/detailed checks DB+Redis+storage.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks: [rtp-network]

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  rtp-network:
    driver: bridge
