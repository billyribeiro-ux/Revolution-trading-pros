name: Deploy Frontend (Cloudflare Pages)

# This workflow is a SECONDARY deploy path. The Cloudflare Pages dashboard
# Git integration is the primary one — it builds and deploys every push to
# main automatically and is the source of truth for production.
#
# This workflow exists for:
#   - workflow_dispatch (manual deploy of a specific branch / commit)
#   - PR preview deploys (Cloudflare Pages dashboard handles these for the
#     main project; this is a backup path)
#
# Required repo secrets:
#   - CLOUDFLARE_API_TOKEN  — token with "Pages: Edit" permission
#   - CLOUDFLARE_ACCOUNT_ID — from the Cloudflare dashboard

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Cloudflare Pages branch (production / preview / staging / pr-N)"
        required: false
        default: "preview"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-cloudflare.yml"
      - "pnpm-lock.yaml"

# pnpm version is intentionally NOT pinned here — pnpm/action-setup@v4
# reads it from package.json#packageManager (pnpm@11.5.1), so this
# workflow, ci.yml, and local always use the exact same pnpm. One
# source of truth, no drift.
env:
  NODE_VERSION: "24.15.0"
  CLOUDFLARE_PROJECT_NAME: revolution-trading-pros

jobs:
  build-and-deploy:
    name: Build + Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Hoist the secrets into a job-level env so step `if:` expressions can
    # reference them. The `secrets` context is only valid in `with:`/`env:`
    # bindings and `with:` inputs, not directly in `if:` conditions.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        run: pnpm --filter revolution-svelte build
        env:
          API_BASE_URL: <your-api-host>
          BACKEND_URL: <your-api-host>

      # Branch resolution: PRs go to pr-N, manual dispatch uses the chosen
      # input, anything else lands on the "preview" branch.
      - name: Determine deploy branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.branch || 'preview' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if Cloudflare secrets missing
        id: gate
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secret is not configured. Skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: >-
            pages deploy .svelte-kit/cloudflare
            --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
            --branch=${{ steps.branch.outputs.name }}
