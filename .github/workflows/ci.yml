name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# pnpm version is intentionally NOT pinned here — pnpm/action-setup@v4
# reads it from package.json#packageManager (pnpm@11.1.2), so CI and
# local always use the exact same pnpm. One source of truth, no drift.
env:
  NODE_VERSION: "22"
  # Pinned (NOT "stable") for a reproducible backend gate — see the
  # rust-toolchain step note + rust-toolchain.toml.
  RUST_VERSION: "1.94.1"

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Frontend: typecheck + unit tests + build
  # ───────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (check + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # GitHub-hosted runners are memory-constrained (~7 GB). This is a very
    # large Vite app (threlte/three.js, ~1.6k modules); `vite build` and
    # vitest need a raised V8 heap or they OOM on the runner — the single
    # difference vs the Cloudflare Pages build and local builds, which
    # have more memory and pass. Job-level so build AND vitest get it
    # (previously only `lint` raised the heap, via its npm script).
    env:
      NODE_OPTIONS: --max-old-space-size=6144

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (svelte-kit sync && svelte-check)
        run: pnpm --filter revolution-svelte check

      - name: Lint (eslint — blocking, 0 errors required)
        run: pnpm --filter revolution-svelte lint

      - name: Unit tests (vitest)
        run: pnpm --filter revolution-svelte test:unit

      - name: Production build
        run: pnpm --filter revolution-svelte build
        env:
          # `<your-api-host>` was a literal placeholder → an invalid URL
          # for any build-time SSR/prerender fetch. localhost mirrors the
          # proxy default and the exact condition under which the cold
          # build is proven green (prerender fetch → clean ECONNREFUSED
          # the pages tolerate; build still completes).
          API_BASE_URL: http://localhost:8080
          BACKEND_URL: http://localhost:8080

  # ───────────────────────────────────────────────────────────────────────
  # Frontend: end-to-end (Playwright, chromium only — fastest meaningful gate)
  #
  # The e2e job exercises the REAL stack (vite frontend + Rust API + Postgres).
  # Six of 21 specs import tests/e2e/_creds.ts, which throws synchronously at
  # import time if E2E_SUPERADMIN_EMAIL/PASSWORD are unset — so the suite
  # cannot even DISCOVER unless those vars are wired. We make them wired by
  # generating an ephemeral CI-only password per run, seeding it into the
  # bootstrap developer user via DEVELOPER_BOOTSTRAP_*, then elevating that
  # user to super_admin via psql (bootstrap_developer hardcodes role='developer').
  # No user-set secrets are required for the gate to be green; STRIPE_SECRET
  # would only be needed to also exercise the subscription-checkout spec,
  # which self-skips when RUN_STRIPE_E2E≠1.
  # ───────────────────────────────────────────────────────────────────────
  e2e:
    name: Frontend e2e (Playwright chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: frontend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rtp
          POSTGRES_PASSWORD: rtp
          POSTGRES_DB: revolution_trading_pros
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp -d revolution_trading_pros"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      # Backend env — ephemeral, never reused beyond this job. JWT_SECRET is
      # bound to the run id so a leak of CI logs can't be replayed against
      # another run (or against any deployed env).
      DATABASE_URL: postgres://rtp:rtp@localhost:5432/revolution_trading_pros
      JWT_SECRET: ci-only-jwt-${{ github.run_id }}-${{ github.run_attempt }}
      ENVIRONMENT: development
      PORT: "8080"
      RUST_LOG: info
      SQLX_OFFLINE: "true"
      # Bootstrap email is also the e2e superadmin — single source of truth
      # for both API seed and playwright login.
      DEVELOPER_BOOTSTRAP_EMAIL: ci-e2e-admin@test.local
      DEVELOPER_BOOTSTRAP_NAME: CI E2E Admin
      E2E_SUPERADMIN_EMAIL: ci-e2e-admin@test.local
      # Frontend env — SvelteKit +server.ts proxies under src/routes/api/ read
      # API_BASE_URL/BACKEND_URL; pin to the same port the API binds.
      API_BASE_URL: http://localhost:8080
      BACKEND_URL: http://localhost:8080
      # GitHub-hosted runners ~7 GB; vite startup for this app needs headroom.
      NODE_OPTIONS: --max-old-space-size=6144

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
          # Shared key with the Backend job so the e2e build hits a warm
          # cache after the first run — release vs dev profile artifacts
          # are distinct keys, so we only use dev for both gates.
          shared-key: backend-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral E2E admin password + argon2id hash
        id: pw
        # Argon2 params match bootstrap_dev.rs / seed-local-admin.sh exactly
        # (memory_cost: 65536 KiB, time_cost: 3, parallelism: 4, hash_len: 32)
        # so the hash is portable to the local dev seed flow too.
        run: |
          set -euo pipefail
          PASSWORD=$(openssl rand -hex 32)
          echo "::add-mask::$PASSWORD"
          python3 -m pip install --quiet --user argon2-cffi
          HASH=$(RTP_PWD="$PASSWORD" python3 -c "
          import os
          from argon2 import PasswordHasher
          ph = PasswordHasher(time_cost=3, memory_cost=65536, parallelism=4, hash_len=32)
          print(ph.hash(os.environ['RTP_PWD']), end='')
          ")
          if [ "${HASH:0:10}" != '$argon2id$' ]; then
            echo "ERROR: argon2 hash generation failed (got: ${HASH:0:30}…)" >&2
            exit 1
          fi
          {
            echo "password=$PASSWORD"
            echo "hash=$HASH"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build API (dev profile, debug — fastest with cache reuse)
        working-directory: api
        run: cargo build --locked

      - name: Start API in background
        working-directory: api
        env:
          DEVELOPER_BOOTSTRAP_PASSWORD_HASH: ${{ steps.pw.outputs.hash }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/rtp-api
          ./target/debug/revolution-api > /tmp/rtp-api/api.log 2>&1 &
          echo $! > /tmp/rtp-api/api.pid
          echo "Started API with PID $(cat /tmp/rtp-api/api.pid)"

      - name: Wait for API /health (≤60s)
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API failed to start within 60s — see API log below:"
          cat /tmp/rtp-api/api.log || true
          exit 1

      - name: Elevate bootstrap user to super_admin
        # bootstrap_developer (db/mod.rs:57) hardcodes role='developer'; the
        # e2e cred-needing specs assert super_admin authorization. One-shot
        # UPDATE here so we don't have to add a SUPERADMIN_BOOTSTRAP path to
        # the API for a CI-only need.
        env:
          PGPASSWORD: rtp
        run: |
          set -euo pipefail
          psql -h localhost -U rtp -d revolution_trading_pros \
            --set=ON_ERROR_STOP=1 \
            -c "UPDATE users SET role='super_admin' WHERE email='ci-e2e-admin@test.local';" \
            -c "SELECT id, email, role FROM users WHERE email='ci-e2e-admin@test.local';"

      - name: Run e2e
        working-directory: frontend
        env:
          E2E_SUPERADMIN_PASSWORD: ${{ steps.pw.outputs.password }}
          # RUN_STRIPE_E2E intentionally NOT set → subscription-checkout.spec.ts
          # self-skips per its own guard. Set a real Stripe test-mode key as
          # STRIPE_SECRET and add RUN_STRIPE_E2E: "1" here to enable.
        run: pnpm exec playwright test tests/e2e --project=chromium --reporter=line

      - name: Print API log on failure
        if: failure()
        run: |
          echo "─── API log (tail 200) ───"
          tail -n 200 /tmp/rtp-api/api.log || echo "(no log)"

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/rtp-api/api.pid ]; then
            kill "$(cat /tmp/rtp-api/api.pid)" 2>/dev/null || true
          fi

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
            /tmp/rtp-api/api.log
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Backend: cargo fmt + clippy(-D warnings) + check + no-DB unit tests
  # ───────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (fmt + clippy + check + no-DB tests)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      # @master honors the `toolchain:` input; the `@stable` wrapper
      # ALWAYS installs stable and silently ignores `toolchain:`, which
      # is why the backend gate floated on a moving toolchain and broke
      # non-deterministically once clippy was made `-D warnings`. Pinned
      # to the exact version the gate is verified against (also in
      # rust-toolchain.toml so local + contributors match CI forever).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Canonical gate per CLAUDE.md — blocking, no continue-on-error.
      - name: cargo clippy (-D warnings, blocking)
        run: cargo clippy --locked --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: cargo check
        run: cargo check --locked --all-targets
        env:
          SQLX_OFFLINE: "true"

      # Exercises the REAL revolution_api crate (no duplicated copies).
      - name: cargo test (no-DB unit tests, real crate)
        run: cargo test --locked --test utils_test --test stripe_test
        env:
          SQLX_OFFLINE: "true"
