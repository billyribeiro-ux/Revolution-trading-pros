name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# pnpm version is intentionally NOT pinned here — pnpm/action-setup@v4
# reads it from package.json#packageManager (pnpm@11.1.2), so CI and
# local always use the exact same pnpm. One source of truth, no drift.
env:
  NODE_VERSION: "22"
  RUST_VERSION: "stable"

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Frontend: typecheck + unit tests + build
  # ───────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (check + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (svelte-kit sync && svelte-check)
        run: pnpm --filter revolution-svelte check

      - name: Lint (eslint — blocking, 0 errors required)
        run: pnpm --filter revolution-svelte lint

      - name: Unit tests (vitest)
        run: pnpm --filter revolution-svelte test:unit

      - name: Production build
        run: pnpm --filter revolution-svelte build
        env:
          API_BASE_URL: <your-api-host>
          BACKEND_URL: <your-api-host>

  # ───────────────────────────────────────────────────────────────────────
  # Frontend: end-to-end (Playwright, chromium only — fastest meaningful gate)
  # ───────────────────────────────────────────────────────────────────────
  e2e:
    name: Frontend e2e (Playwright chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        working-directory: frontend
        run: pnpm exec playwright test tests/e2e --project=chromium --reporter=line

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Backend: cargo fmt + clippy(-D warnings) + check + no-DB unit tests
  # ───────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (fmt + clippy + check + no-DB tests)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Canonical gate per CLAUDE.md — blocking, no continue-on-error.
      - name: cargo clippy (-D warnings, blocking)
        run: cargo clippy --locked --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: cargo check
        run: cargo check --locked --all-targets
        env:
          SQLX_OFFLINE: "true"

      # Exercises the REAL revolution_api crate (no duplicated copies).
      - name: cargo test (no-DB unit tests, real crate)
        run: cargo test --locked --test utils_test --test stripe_test
        env:
          SQLX_OFFLINE: "true"
