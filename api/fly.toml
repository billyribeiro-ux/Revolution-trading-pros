# fly.toml - Revolution Trading Pros API
# Fly.io Best Practices Configuration - January 2026
# See https://fly.io/docs/reference/configuration/
#
# Required Fly secrets (set via `fly secrets set KEY=value`):
#   DATABASE_URL          — PostgreSQL connection string
#   JWT_SECRET            — HS256 signing secret (≥32 chars)
#   CORS_ORIGINS          — Comma-separated allowed origins
#   R2_ACCESS_KEY_ID      — Cloudflare R2 access key
#   R2_SECRET_ACCESS_KEY  — Cloudflare R2 secret key
#   MEILI_URL             — Meilisearch instance URL
#   MEILI_MASTER_KEY      — Meilisearch master key
#   STRIPE_SECRET_KEY     — Stripe secret key (sk_live_... or sk_test_...)
#   STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret (whsec_...)

app = 'revolution-trading-pros-api'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

# Non-secret environment variables
[env]
  RUST_LOG = "info,revolution_api=debug"
  RUST_BACKTRACE = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Health checks - critical for zero-downtime deploys
[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

# VM configuration
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
