# cargo-deny policy for revolution-api
#
# Run via:    cd api && cargo deny check
# Or:         pnpm api:lint   (root package.json)
#
# This file is the single source of truth for our dependency hygiene
# gates: security advisories, license compliance, duplicate-version
# detection, and source restrictions.
#
# ────────────────────────────────────────────────────────────────────────
# Schema version (cargo-deny >=0.19.x is current as of 2026-04).
# ────────────────────────────────────────────────────────────────────────

[graph]
# We ship a single tokio-based binary on Linux. No cross-target audit yet.
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ────────────────────────────────────────────────────────────────────────
# Advisories: vulns + unmaintained + yanked
#
# In cargo-deny >=0.16, advisory-type keys (`vulnerability`, `unmaintained`,
# `notice`, `unsound`) were removed — every advisory is fatal by default,
# and you opt out via `ignore`. We list any acknowledged exceptions there
# with a written reason. Yanked-crate handling is a top-level setting.
# ────────────────────────────────────────────────────────────────────────
[advisories]
yanked = "warn"

# ─────────────────────────────────────────────────────────────────────────
# IGNORED ADVISORIES — every entry is an explicit, time-bounded exception.
# Each carries a written reason so `cargo deny check` produces an audit
# trail rather than silent allowance. These were surfaced and triaged on
# 2026-04-25; revisit in Week-5 of the Rust-backend plan.
# ─────────────────────────────────────────────────────────────────────────
ignore = [
    # ── rustls-webpki 0.101.7 (transitive via reqwest 0.11) ──────────────
    # Fix requires bumping reqwest 0.11 → 0.12 (breaking API change in
    # response builder). Out of scope for the Week-4 tooling slice.
    # We do not parse user-supplied CRLs; wildcard-constraint exposure
    # requires CA misissuance (not in our threat model on these paths).
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101.x URI name-constraint bug; pulled via reqwest 0.11. Track as `bump reqwest to 0.12`." },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101.x DNS wildcard constraint bug; pulled via reqwest 0.11. Track as `bump reqwest to 0.12`." },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101.x CRL parser panic; pulled via reqwest 0.11. We don't accept CRLs. Track as `bump reqwest to 0.12`." },

    # ── miscellaneous unmaintained / unsound ─────────────────────────────
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive via validator_derive. Replace by bumping validator." },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive via reqwest 0.11. Resolved by reqwest 0.12 bump." },
]

# ────────────────────────────────────────────────────────────────────────
# Licenses: permissive-only allow-list.
# ────────────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",                   # ring's effective license (clarified below)
    "BSL-1.0",
    "CDLA-Permissive-2.0",       # webpki-roots — Mozilla CA bundle redistribution
]
confidence-threshold = 0.93
# Crates with hand-rolled / non-SPDX license texts that still need to be
# accepted. Each entry is justified.
exceptions = []

# This is a private, unpublished workspace member; we don't ship it as a
# crate. cargo-deny still requires a license to be set or for private
# crates to be ignored — we choose the latter so we never have to argue
# about which OSS license to apply to proprietary code.
[licenses.private]
ignore = true

# ────────────────────────────────────────────────────────────────────────
# Bans: detect duplicate copies of perf/correctness-critical crates.
#
# Multiple versions of `tokio`, `sqlx`, or `axum` in the same binary is a
# correctness hazard (different runtimes, different connection pools,
# different routers). Other duplicates are merely bloat — we warn but do
# not fail the build on those.
# ────────────────────────────────────────────────────────────────────────
[bans]
# We rely on `multiple-versions = "warn"` for general bloat detection.
# For the perf/correctness-critical singleton crates (tokio, sqlx, axum),
# we encode the "must be single-version" contract via a CI assertion — see
# the `pnpm api:lint:singletons` script in the root package.json. cargo-
# deny's `[[bans.deny]]` is a graph-presence ban (not a multiple-version
# ban), so it can't express the rule we actually want here.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# Common transitive duplicates that are NOT fatal — they just bloat the
# binary. We allowlist them here so `multiple-versions = "warn"` stays
# signal, not noise.
skip = []
skip-tree = []

# ────────────────────────────────────────────────────────────────────────
# Sources: only crates.io. No git deps, no private registries.
# ────────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
